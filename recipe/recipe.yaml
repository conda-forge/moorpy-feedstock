schema_version: 1

context:
  name: MoorPy
  version: "1.3.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  #url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/MoorPy-{{ version }}.tar.gz
  url: https://github.com/NREL/MoorPy/archive/v${{ version }}.tar.gz
  sha256: e24c724dafd5bcdc3ab1aa621a10f7bfff211a42df120bdc7bec043cc71e2e4e

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - matplotlib-base
    - numpy
    - python >=${{ python_min }}
    - pyyaml
    - scipy

tests:
  - python:
      imports:
        - moorpy
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: A design-oriented mooring system library for Python
  description: |
    MoorPy is a design-oriented mooring system library for Python based around a
    quasi-static modeling approach.
  license: BSD-3-Clause
  license_file: LICENSE.txt
  homepage: https://github.com/nrel/moorpy
  repository: https://github.com/nrel/moorpy

extra:
  recipe-maintainers:
    - gbarter
    - mattEhall
